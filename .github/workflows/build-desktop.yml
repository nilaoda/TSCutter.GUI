name: Build and Direct Release

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: Confirm publishing GitHub release directly after build
        required: true
        type: boolean
        default: false

env:
  DOTNET_SDK_VERSION: 10.x
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FFMPEG_RUNTIME_WIN_X64_URL: https://github.com/nilaoda/FFmpegSharedLibraries/releases/download/20260614/ffmpeg-runtime-win64-gpl-shared-7.1.3.zip
  FFMPEG_RUNTIME_LINUX_X64_URL: https://github.com/nilaoda/FFmpegSharedLibraries/releases/download/20260614/ffmpeg-runtime-linux-x64-gpl-shared-7.1.3.zip
  FFMPEG_RUNTIME_OSX_ARM64_URL: https://github.com/nilaoda/FFmpegSharedLibraries/releases/download/20260614/ffmpeg-runtime-osx-arm64-gpl-shared-7.1.3.zip

jobs:
  confirm-release:
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit release confirmation
        run: |
          if [ "${{ inputs.publish_release }}" != "true" ]; then
            echo "::error::publish_release must be explicitly enabled for this temporary direct-release workflow."
            exit 1
          fi

  set-date:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.get_date.outputs.date }}
      tag: ${{ steps.get_date.outputs.tag }}
      release_time: ${{ steps.get_date.outputs.release_time }}
    steps:
      - name: Get release metadata in UTC+8
        id: get_date
        run: |
          DATE="$(date -u -d '8 hours' +'%Y%m%d')"
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          echo "tag=alphabuild_$DATE" >> "$GITHUB_OUTPUT"
          echo "release_time=$(date -u -d '8 hours' +'%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

  prepare-release:
    runs-on: ubuntu-latest
    needs: [confirm-release, set-date]
    permissions:
      contents: write

    steps:
      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.set-date.outputs.tag }}
          RELEASE_TIME: ${{ needs.set-date.outputs.release_time }}
        run: |
          if IS_DRAFT="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft 2>/dev/null)"; then
            if [ "$IS_DRAFT" != "true" ]; then
              echo "::error::Published release $RELEASE_TAG already exists."
              exit 1
            fi

            echo "Reusing existing draft release $RELEASE_TAG."
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target main \
            --title "Alpha-Build ($RELEASE_TIME)" \
            --generate-notes \
            --draft

  build-win-x64:
    runs-on: windows-latest
    needs: [set-date, prepare-release]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Install 7zip and zip
        run: |
          choco install 7zip --no-progress --yes
          choco install zip --no-progress --yes

      - name: Download ANGLE.Static
        run: |
          cd src/TSCutter.GUI/lib
          curl -L https://github.com/2ndlab/ANGLE.Static/releases/download/v1.1.0/av_libglesv2-10.0.22621.0.7z -o angle.7z
          7z x angle.7z

      - name: Download SkiaSharp.Static (HarfBuzz)
        run: |
          cd src/TSCutter.GUI/lib
          curl -L https://github.com/2ndlab/SkiaSharp.Static/releases/download/v1.0.0/libHarfBuzzSharp.zip -o harfbuzz.zip
          unzip -o harfbuzz.zip -d .
          7z x libHarfBuzzSharp.7z

      - name: Download SkiaSharp.Static (SkiaSharp)
        run: |
          cd src/TSCutter.GUI/lib
          curl -L https://github.com/2ndlab/SkiaSharp.Static/releases/download/v1.0.0/libSkiaSharp.zip -o skiasharp.zip
          unzip -o skiasharp.zip -d .
          7z x libSkiaSharp.7z

      - name: Publish [win-x64]
        run: | 
          cd src/TSCutter.GUI
          dotnet publish -r win-x64 -c Release -o artifact

      - name: Download FFmpeg Runtime [win-x64]
        shell: pwsh
        run: |
          $zipPath = Join-Path $env:RUNNER_TEMP "ffmpeg-runtime-win-x64.zip"
          Invoke-WebRequest -Uri "${{ env.FFMPEG_RUNTIME_WIN_X64_URL }}" -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath "src/TSCutter.GUI/artifact" -Force

      - name: Package [win-x64]
        run: |
          cd src/TSCutter.GUI/artifact
          zip -r ../../../TSCutter.GUI_Alpha_win-x64_${{ needs.set-date.outputs.date }}.zip . -x "lib*" -x "av_*" -x "*.pdb"

      - name: Upload Release Asset [win-x64]
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.set-date.outputs.tag }}" `
            "TSCutter.GUI_Alpha_win-x64_${{ needs.set-date.outputs.date }}.zip" `
            --repo "$env:GITHUB_REPOSITORY" `
            --clobber

  build-linux-x64:
    runs-on: ubuntu-latest
    needs: [set-date, prepare-release]
    permissions:
      contents: write

    steps:
      - run: sudo apt-get update
      - run: sudo apt-get install -y curl wget unzip libicu-dev libcurl4-openssl-dev zlib1g-dev libkrb5-dev zip
      - uses: actions/checkout@v4

      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Publish [linux-x64]
        run: dotnet publish src/TSCutter.GUI -r linux-x64 -c Release -o artifact

      - name: Download FFmpeg Runtime [linux-x64]
        run: |
          curl -L "${{ env.FFMPEG_RUNTIME_LINUX_X64_URL }}" -o "$RUNNER_TEMP/ffmpeg-runtime-linux-x64.zip"
          unzip -o "$RUNNER_TEMP/ffmpeg-runtime-linux-x64.zip" -d artifact

      - name: Package [linux-x64]
        run: |
          cd artifact
          zip -r ../TSCutter.GUI_Alpha_linux-x64_${{ needs.set-date.outputs.date }}.zip . -x "*.dbg"

      - name: Upload Release Asset [linux-x64]
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.set-date.outputs.tag }}" \
            "TSCutter.GUI_Alpha_linux-x64_${{ needs.set-date.outputs.date }}.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  build-mac-arm64:
    runs-on: macos-14
    needs: [set-date, prepare-release]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_SDK_VERSION }}

      - name: Publish [osx-arm64]
        run: dotnet publish src/TSCutter.GUI -r osx-arm64 -c Release -o artifact

      - name: Assemble .app [osx-arm64]
        run: |
          APP_NAME="TSCutter.GUI.app"
          APP_ROOT="$RUNNER_TEMP/$APP_NAME"
          CONTENTS_DIR="$APP_ROOT/Contents"
          MACOS_DIR="$CONTENTS_DIR/MacOS"
          RESOURCES_DIR="$CONTENTS_DIR/Resources"
          ICON_SOURCE="$GITHUB_WORKSPACE/src/TSCutter.GUI/Assets/logo.png"
          APP_VERSION="$(grep -m1 '<Version>' src/TSCutter.GUI/TSCutter.GUI.csproj | sed -E 's/.*<Version>([^<]+)<\/Version>.*/\1/')"

          rm -rf "$APP_ROOT"
          mkdir -p "$MACOS_DIR" "$RESOURCES_DIR"

          cp -R artifact/. "$MACOS_DIR/"
          curl -L "${{ env.FFMPEG_RUNTIME_OSX_ARM64_URL }}" -o "$RUNNER_TEMP/ffmpeg-runtime-osx-arm64.zip"
          unzip -o "$RUNNER_TEMP/ffmpeg-runtime-osx-arm64.zip" -d "$MACOS_DIR"
          find "$MACOS_DIR" -maxdepth 1 -name '*.dSYM' -prune -exec rm -rf {} +

          sips -s format icns "$ICON_SOURCE" --out "$RESOURCES_DIR/logo.icns" >/dev/null

          cat > "$CONTENTS_DIR/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>TSCutter.GUI</string>
            <key>CFBundleExecutable</key>
            <string>TSCutterGUI</string>
            <key>CFBundleIconFile</key>
            <string>logo.icns</string>
            <key>CFBundleIdentifier</key>
            <string>com.nilaoda.tscuttergui</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>TSCutter.GUI</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>$APP_VERSION</string>
            <key>CFBundleVersion</key>
            <string>${{ needs.set-date.outputs.date }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>13.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Package [osx-arm64]
        run: |
          cd "$RUNNER_TEMP"
          ditto -c -k --sequesterRsrc --keepParent "TSCutter.GUI.app" "$GITHUB_WORKSPACE/TSCutter.GUI_Alpha_osx-arm64_${{ needs.set-date.outputs.date }}.zip"

      - name: Upload Release Asset [osx-arm64]
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.set-date.outputs.tag }}" \
            "TSCutter.GUI_Alpha_osx-arm64_${{ needs.set-date.outputs.date }}.zip" \
            --repo "$GITHUB_REPOSITORY" \
            --clobber

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-win-x64, build-linux-x64, build-mac-arm64, set-date, prepare-release]

    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ needs.set-date.outputs.tag }}" \
            --repo "$GITHUB_REPOSITORY" \
            --draft=false \
            --latest
